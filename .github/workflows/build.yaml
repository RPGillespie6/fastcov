name: build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build test image
        run: sudo podman build -t fastcov-testenv .

      - name: Run Tests
        run: sudo podman run --rm -v "${PWD}:/mnt/workspace" -w /mnt/workspace/test fastcov-testenv ./run_tests.sh

      - name: Upload Coverage
        run: bash <(curl -s https://codecov.io/bash) -X gcov -X coveragepy -f test/functional/cmake_project/build/coverage.xml -f test/unit/coverage.xml

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run mypy type checker
        run: mypy fastcov.py --config-file pyproject.toml
